version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17

  pre_build:
    commands:
      - echo Build started on `date`
      - java -version
      - mvn -version

  build:
    commands:
      - echo Running Maven build
      - mvn clean package -DskipTests

  post_build:
    commands:
      - echo Build completed on `date`
      - ls -lah target

artifacts:
  files:
    - target/*.jar
  discard-paths: yes